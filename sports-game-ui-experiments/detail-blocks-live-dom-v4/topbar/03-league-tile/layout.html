<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=190, initial-scale=1.0" />
    <title>03 League Tile Live DOM</title>
    <link rel="stylesheet" href="./block.css" />
  </head>
  <body class="layout-body">
    <button
      class="league-tile"
      type="button"
      data-component="league-tile"
      data-action="open-league"
      data-league-id="pro-league"
      aria-label="PRO LEAGUE, Season 12, 3rd of 20"
    >
      <img class="league-crest" src="./assets/micro-crops/league-crest.png" width="62" height="64" alt="" />
      <span class="league-copy">
        <span class="league-name">PRO LEAGUE</span>
        <span class="season">Season 12</span>
        <span class="rank"><span class="rank-current">3rd</span> / 20</span>
      </span>
    </button>
  </body>
</html>
