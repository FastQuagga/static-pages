<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>06 Current Tactic Chip</title>
  <link rel="stylesheet" href="block.css">
</head>
<body class="layout-page">
  <button class="tactic-chip" type="button" aria-label="Current tactic: 4-3-3 attack" data-block="current-tactic-chip" data-action="open-tactic-selector">
    <span class="tactic-chip__title" data-bind="card-title">CURRENT TACTIC</span>
    <span class="tactic-chip__body">
      <img src="assets/micro-crops/tactic-glyph.png" width="31" height="31" alt="" aria-hidden="true">
      <span data-bind="current-tactic">4-3-3 ATTACK</span>
    </span>
  </button>
</body>
</html>
