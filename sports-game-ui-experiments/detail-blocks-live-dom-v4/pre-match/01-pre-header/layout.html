<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>01 Pre Header</title>
  <link rel="stylesheet" href="block.css">
</head>
<body class="layout-page">
  <section class="pre-header" aria-label="Pre-match header" data-block="pre-header">
    <div class="pre-header__copy">
      <div class="pre-header__title" data-bind="section-title">PRE-MATCH</div>
      <div class="pre-header__subtitle" data-bind="section-subtitle">Prepare and plan your victory</div>
    </div>
    <button class="pre-header__toggle" type="button" aria-label="Collapse pre-match" data-action="toggle-pre-match">
      <span aria-hidden="true"></span>
    </button>
  </section>
</body>
</html>
