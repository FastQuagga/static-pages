<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>05 Coach Recommendation Card</title>
  <link rel="stylesheet" href="block.css">
</head>
<body class="layout-page">
  <section class="coach-card" aria-label="Coach recommendation" data-block="coach-recommendation-card">
    <div class="coach-card__title" data-bind="card-title">COACH RECOMMENDATION</div>
    <div class="coach-card__body">
      <img src="assets/micro-crops/key-icon.png" width="29" height="31" alt="" aria-hidden="true">
      <p data-bind="recommendation-copy">Their defense is vulnerable.<br>Use <strong data-bind="recommended-tactic">ATTACK</strong> tactic to maximize your chances.</p>
    </div>
  </section>
</body>
</html>
