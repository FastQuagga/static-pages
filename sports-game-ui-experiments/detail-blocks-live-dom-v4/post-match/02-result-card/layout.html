<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=406, initial-scale=1.0" />
    <title>Result Card Live DOM</title>
    <link rel="stylesheet" href="./block.css" />
  </head>
  <body>
    <section class="block-root result-card" data-block="result-card" aria-label="Match result">
      <img class="team-crest team-crest-home" src="./assets/micro-crops/crest-home.png" width="58" height="68" alt="" data-asset="home-crest" />
      <div class="score-stack" data-role="score-summary">
        <output class="score-value" data-field="score">3 - 1</output>
        <output class="result-badge" data-field="result">WIN</output>
      </div>
      <img class="team-crest team-crest-away" src="./assets/micro-crops/crest-away.png" width="58" height="68" alt="" data-asset="away-crest" />
      <span class="team-name team-name-home" data-field="home-team">NEWPORT CITY</span>
      <span class="team-name team-name-away" data-field="away-team">RIVERSIDE UTD</span>
    </section>
  </body>
</html>
