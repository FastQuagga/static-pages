<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=430, initial-scale=1.0" />
    <title>Post Header Live DOM</title>
    <link rel="stylesheet" href="./block.css" />
  </head>
  <body>
    <section class="block-root post-header" data-block="post-header" aria-label="Post-match panel header">
      <div class="header-copy" data-role="post-match-copy">
        <strong data-field="title">POST-MATCH</strong>
        <span data-field="subtitle">Review and plan ahead</span>
      </div>
      <button class="collapse-button" type="button" data-action="toggle-post-match" aria-label="Collapse post-match panel">
        <span aria-hidden="true">⌃</span>
      </button>
    </section>
  </body>
</html>
