<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=406, initial-scale=1.0" />
    <title>Why We Won Live DOM</title>
    <link rel="stylesheet" href="./block.css" />
  </head>
  <body>
    <section class="block-root why-card" data-block="why-we-won-card" aria-label="Why we won">
      <h2 data-field="title">WHY WE WON</h2>
      <ul class="reason-list" data-list="win-reasons">
        <li data-reason-id="defense">
          <img src="./assets/micro-crops/reason-shield.png" width="28" height="28" alt="" data-asset="reason-icon" />
          <span data-field="reason-copy">Solid defense limited their scoring chances.</span>
        </li>
        <li data-reason-id="wing-play">
          <img src="./assets/micro-crops/reason-boot.png" width="28" height="28" alt="" data-asset="reason-icon" />
          <span data-field="reason-copy">Our wing play created many dangerous chances.</span>
        </li>
        <li data-reason-id="midfield">
          <img src="./assets/micro-crops/reason-star.png" width="28" height="28" alt="" data-asset="reason-icon" />
          <span data-field="reason-copy">Midfield controlled possession and tempo.</span>
        </li>
      </ul>
    </section>
  </body>
</html>
